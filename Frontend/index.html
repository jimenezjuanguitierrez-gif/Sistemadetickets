<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC Forum — Iniciar sesión</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-box">
      <div>
        <div class="auth-logo">🖥️ PC Forum</div>
      </div>

      <div>
        <div class="auth-title">Iniciar sesión</div>
      </div>

      <div class="alert alert-error" id="err"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="tu@escuela.edu" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="********" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">
        Entrar
      </button>

      <div class="auth-footer">
        ¿No tenés cuenta? <a href="register.html">Registrarse</a>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    const s = API.getSession();
    if (s) API.redirect(s.rol);

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      API.clearError('err');

      if (!email || !password) {
        API.showError('err', 'Completá todos los campos.'); return;
      }

      btn.disabled = true;
      btn.textContent = 'Ingresando…';

      try {
        const user = await API.login(email, password);
        API.redirect(user.rol);
      } catch (e) {
        API.showError('err', e.message || 'Credenciales incorrectas.');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
